name: CI

on: 
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go tests
        run: go test ./...

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ./react-app
        run: npm ci
      
      - name: Run Vistest
        working-directory: ./react-app
        run: npx vitest run

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t vhs-backend .


      - name: Build frontend image
        run: docker build -f react-app/Dockerfile.frontend -t vhs-frontend ./react-app

      - name: Build db image
        run: docker build -f Dockerfile.db -t vhs-db .

  smoke-test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:80; then
              echo "frontend is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend never became ready"
          docker compose logs
          exit 1

      - name: Curl the front page
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:80)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed!"
            docker compose logs
            exit 1
          fi

      - name: Tear down
        if: always()
        run: docker compose down
